<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <!-- aula  de arrow function e setInternal -->
      <div id = "caixa"></div>
<style>

    body{
        background-color: yellow;
    }
    #caixa{
        width: 50px;
        height: 50px;
        background-color: blueviolet;
        position: absolute;
        left: 0px;
        top: 0px;
    }
</style>
<script>
    let caixa = document.getElementById("caixa");
    let x = 0
    let y = 100
    let direcao ="direita"

    setInterval(()=>{
      switch(direcao){
     case"direita": x+=500;if(x>300)direcao ="baixo"; 
     break;

     case"baixo": y+=500; if(y>300)direcao ="esquerda"; 
     break;

     case"esquerda": x-=500; if(x<0)direcao = "cima";break;

     case"cima": y-=500; if(y<0)direcao = "direita";break;

     
      }
      caixa.style.left = x+"px";
      caixa.style.top = y+"px";
      
    },0.1);
</script>
</body>
</html>
